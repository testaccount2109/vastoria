services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vastoria
      POSTGRES_PASSWORD: vastoria
      POSTGRES_DB: vastoria_cloud
    volumes:
      - vastoria_cloud_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vastoria -d vastoria_cloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  cloud-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 18430
      DATABASE_URL: postgresql://vastoria:vastoria@postgres:5432/vastoria_cloud
      PUBLIC_BASE_URL: https://vastoria.online/api
      DOWNLOADS_BASE_URL: https://vastoria.online/downloads
      BLOB_STORAGE_PATH: /data/blobs
      ARTIFACT_STORAGE_PATH: /data/artifacts
      SEED_RELEASES_ON_STARTUP: "true"
      SEED_MODELS_ON_STARTUP: "true"
      DEBUG: "false"
    volumes:
      - vastoria_blobs:/data/blobs
      - vastoria_artifacts:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "18430"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cloud-api

volumes:
  vastoria_cloud_pg:
  vastoria_blobs:
  vastoria_artifacts:
