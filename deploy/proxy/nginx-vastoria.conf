# Nginx fallback config for the single-domain production topology.
# Preferred production proxy is deploy/proxy/Caddyfile.

upstream vastoria_cloud_api {
    server 127.0.0.1:18430;
    keepalive 32;
}

upstream vastoria_website {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vastoria.online www.vastoria.online;

    ssl_certificate     /etc/letsencrypt/live/vastoria.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vastoria.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 512m;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript application/octet-stream;
    gzip_min_length 256;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    if ($host = www.vastoria.online) {
        return 301 https://vastoria.online$request_uri;
    }

    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://vastoria_cloud_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ~ ^/downloads/windows/(v[^/]+/.+|latest\.json|releases\.json|CHANGELOG\.md)$ {
        root /var/www/vastoria;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        proxy_pass http://vastoria_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name vastoria.online www.vastoria.online;
    return 301 https://vastoria.online$request_uri;
}
